<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Wave — Sign In</title>
<link rel="stylesheet" href="assets/css/auth.css"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#080808"/>
<link rel="icon" href="icons/wave-icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/wave-icon-180.png"/>
</head>
<body>

<div class="auth-wrap">

  <!-- Left branding panel -->
  <div class="auth-left">
    <div class="auth-left::before"></div>

    <div class="brand-logo">
      <div class="brand-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2"  y="11" width="4" height="6"  rx="2" fill="white"/>
          <rect x="8"  y="7"  width="4" height="14" rx="2" fill="white"/>
          <rect x="14" y="3"  width="4" height="22" rx="2" fill="white"/>
          <rect x="20" y="7"  width="4" height="14" rx="2" fill="white"/>
        </svg>
      </div>
      <span class="brand-name">WAVE</span>
    </div>

    <h1 class="auth-tagline">Your music.<br><span>Your world.</span></h1>
    <p class="auth-sub">Stream your private collection anywhere. Encrypted, secure, always yours.</p>

    <div class="wave-deco">
      <span style="height:12px; animation-delay:0s"></span>
      <span style="height:22px; animation-delay:0.1s"></span>
      <span style="height:34px; animation-delay:0.2s"></span>
      <span style="height:48px; animation-delay:0.15s"></span>
      <span style="height:60px; animation-delay:0.05s"></span>
      <span style="height:48px; animation-delay:0.25s"></span>
      <span style="height:34px; animation-delay:0.1s"></span>
      <span style="height:22px; animation-delay:0.2s"></span>
      <span style="height:12px; animation-delay:0s"></span>
    </div>
  </div>

  <!-- Right auth panel -->
  <div class="auth-right">
    <h2 class="auth-title" id="authTitle">Sign in to Wave</h2>
    <p class="auth-desc" id="authDesc">Welcome back. Continue with your account.</p>

    <!-- Tab toggle -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Error box -->
    <div class="auth-error" id="authError"></div>

    <!-- Google -->
    <button class="btn-google" id="googleBtn" onclick="handleGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <!-- Email form -->
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') handleEmailAuth()"/>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="handleEmailAuth()">Sign In</button>
  </div>
</div>

<script>
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>

<script type="module">
import { loginWithGoogle, loginWithEmail, signupWithEmail, onAuth } from './assets/js/auth.js';

// Redirect if already logged in
onAuth(user => {
  if (user) window.location.href = 'app.html';
});

let mode = 'login';

window.switchTab = function(tab) {
  mode = tab;
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('authTitle').textContent = tab === 'login' ? 'Sign in to Wave' : 'Create your account';
  document.getElementById('authDesc').textContent  = tab === 'login' ? 'Welcome back. Continue with your account.' : 'Start streaming your collection today.';
  document.getElementById('submitBtn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
  hideError();
};

window.handleGoogle = async function() {
  try {
    setLoading(true);
    await loginWithGoogle();
  } catch(e) {
    showError(friendlyError(e.code));
    setLoading(false);
  }
};

window.handleEmailAuth = async function() {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passInput').value;
  if (!email || !pass) { showError('Please fill in all fields.'); return; }
  try {
    setLoading(true);
    if (mode === 'login') await loginWithEmail(email, pass);
    else await signupWithEmail(email, pass);
  } catch(e) {
    showError(friendlyError(e.code));
    setLoading(false);
  }
};

function setLoading(on) {
  document.getElementById('submitBtn').disabled = on;
  document.getElementById('googleBtn').disabled = on;
  document.getElementById('submitBtn').textContent = on ? 'Please wait…' : (mode === 'login' ? 'Sign In' : 'Create Account');
}

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('authError').style.display = 'none';
}

function friendlyError(code) {
  const map = {
    'auth/user-not-found':       'No account found with this email.',
    'auth/wrong-password':       'Incorrect password. Please try again.',
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}
</script>
</body>
</html>
